services:
  fraud-hunter:
    build: .
    container_name: fraud-hunter
    ports:
      - "8000:8000"
    environment:
      # SQLite por omissão — zero configuração para testar
      DATABASE_URL: "sqlite:////app/data/fraud_hunter.db"
      AUTH_DISABLED: "false"
      APP_NAME: "Fraud Hunter"
    volumes:
      # persistência da base de dados entre reinícios
      - ./data:/app/data
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # PRODUÇÃO (opcional): trocar para PostgreSQL.
